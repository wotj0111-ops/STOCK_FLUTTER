name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Regenerate platform files
        run: flutter create --platforms=android --project-name stock_app .

      - name: Flutter pub get
        run: flutter pub get

      # ───── 아이콘 소스가 없으면 즉석에서 만들어서 사용 ─────
      - name: Generate placeholder icon source
        run: |
          mkdir -p assets/icon
          if [ ! -f assets/icon/icon.png ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
            # 인디고색 배경에 "$" 흰색 글자, 1024x1024 PNG 생성
            convert -size 1024x1024 xc:'#3F51B5' \
              -gravity center -pointsize 640 -fill white \
              -font DejaVu-Sans-Bold -annotate +0+40 '\$' \
              assets/icon/icon.png
          fi
          ls -la assets/icon

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
      # ─────────────────────────────────────────────────────

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
